<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>YouTube Analiz Pro — ViralCut</title>

    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;500;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/App.css">
</head>

<body>
    <!-- Auth Ekranı (Giriş/Kayıt) -->
    <div id="view-auth" style="display: none;"></div>

    <!-- Ana Uygulama İskeleti (App Shell) -->
    <div id="app-layout" class="app-shell" style="display: none;">
        <!-- Sabit Sidebar Konteyneri -->
        <div id="sidebar-container"></div>

        <!-- Dinamik İçerik Alanı -->
        <main id="main-content" class="main-content view-enter">
            <div id="view-dashboard" style="display: none;"></div>
            <div id="view-analyze" style="display: none;"></div>
            <div id="view-result" style="display: none;"></div>
            <div id="view-settings" style="display: none;"></div>
        </main>
    </div>

    <div id="chatbot-container"></div>
    <script src="/static/App.js"></script>
</body>

</html>
