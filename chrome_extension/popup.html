<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Analiz Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ── Header ── -->
  <header class="header">
    <div class="logo-wrap">
      <span class="logo-icon">🚀</span>
      <div>
        <div class="logo-title">YT Analiz Pro</div>
        <div class="logo-sub">Viral Klonlama Motoru</div>
      </div>
    </div>
    <div id="status-dot" class="dot dot--checking" title="Sunucu durumu kontrol ediliyor..."></div>
  </header>

  <!-- ── Main Content ── -->
  <main class="main">

    <!-- Login state -->
    <section id="view-login" class="view active">
      <div class="hero-icon">🔐</div>
      <p class="hint-text">Ekosisteme bağlanmak için giriş yapın.</p>
      <div class="form-group">
        <input type="text" id="login-username" class="input-field" placeholder="Kullanıcı Adı" autocomplete="username" />
      </div>
      <div class="form-group" style="margin-top:8px;">
        <input type="password" id="login-password" class="input-field" placeholder="Şifre" autocomplete="current-password" />
      </div>
      <p id="login-error" class="error-msg" style="display:none; font-size:12px; margin-top:8px;"></p>
      <button id="btn-login" class="btn btn--primary" type="button" style="margin-top:12px;">
        Giriş Yap
      </button>
    </section>

    <!-- Dashboard (Idle) state -->
    <section id="view-idle" class="view">
      <div class="dashboard-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
        <div class="welcome-text" style="font-size:14px; color:#fff;">Hoş geldin, <span id="dash-username" style="font-weight:bold; color:#00f2fe;">...</span></div>
        <button id="btn-logout" class="btn-logout" type="button" title="Çıkış Yap" style="background:transparent; border:none; cursor:pointer; font-size:16px;">🚪</button>
      </div>
      
      <div class="recent-analyses" style="margin-bottom:15px; text-align:left;">
        <h3 class="recent-title" style="font-size:12px; color:#aaa; margin-bottom:8px; text-transform:uppercase;">Son Analizlerim</h3>
        <ul id="recent-list" class="recent-list" style="list-style:none; padding:0; margin:0; max-height:120px; overflow-y:auto; font-size:13px;">
          <li class="recent-loading" style="color:#666; font-style:italic;">Yükleniyor...</li>
        </ul>
      </div>

      <button id="btn-clone" class="btn btn--primary" type="button">
        <span class="btn-icon">⚡</span>
        🚀 Bu Videoyu Klonla
      </button>
    </section>

    <!-- Loading state -->
    <section id="view-loading" class="view">
      <div class="spinner"></div>
      <p class="loading-text">AI senaryoyu analiz ediyor<span class="dots-anim"></span></p>
      <p class="loading-sub" id="loading-sub-text">Transcript çekiliyor...</p>
    </section>

    <!-- Result state -->
    <section id="view-result" class="view">
      <div class="result-badge">✅ Konsept Hazır!</div>
      <div id="video-thumb-wrap" class="thumb-wrap" style="display:none">
        <img id="video-thumb" class="thumb-img" src="" alt="thumbnail" />
        <div id="video-meta" class="thumb-meta"></div>
      </div>
      <div id="result-content" class="result-content"></div>
      <button id="btn-reset" class="btn btn--ghost" type="button">
        ↩ Yeni Video
      </button>
    </section>

    <!-- Error state -->
    <section id="view-error" class="view">
      <div class="error-icon">⚠️</div>
      <p id="error-title" class="error-title">Bir hata oluştu</p>
      <p id="error-msg" class="error-msg"></p>
      <button id="btn-retry" class="btn btn--ghost" type="button">
        ↩ Tekrar Dene
      </button>
    </section>

  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <span>Sunucu: <code>127.0.0.1:8000</code></span>
    <span id="server-status-label" class="server-status">Kontrol ediliyor...</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
